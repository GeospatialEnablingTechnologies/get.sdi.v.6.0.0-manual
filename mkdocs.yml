site_name: SDI Portal Manual
site_description: User manual for the GET SDI Portal.

# IMPORTANT for a project page (served at <user>.github.io/<repo>/):
# uncomment and set this so canonical URLs and search work correctly.
# site_url: https://<your-user-or-org>.github.io/<repo>/

# Optional: shows an "edit this page" pencil linking back to THIS docs repo.
# repo_url: https://github.com/<your-user-or-org>/<repo>
# edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.ico

  # Two palettes with a light/dark toggle. "custom" pulls the exact GET
  # brand hex values from docs/stylesheets/extra.css.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.instant      # SPA-style fast page loads
    - navigation.tracking     # URL updates as you scroll
    - navigation.sections     # top-level nav as grouped sections
    - navigation.top          # back-to-top button
    - navigation.footer       # prev/next links at page bottom
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy       # copy button on code blocks
    - content.code.annotate

  # Drop your logo/favicon into docs/assets/ and uncomment:
  # logo: assets/logo_sdi.png
  # favicon: assets/favicon.png

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition                # note/warning/tip callout boxes
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# Explicit nav for a manual. Add pages here as the manual grows; anything
# under docs/ not listed still builds but won't appear in the sidebar.
nav:
  - Home: index.md
